name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write
  pages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: aeroterm_win_x64
          - os: macos-latest
            rid: osx-arm64
            artifact: aeroterm_osx_arm64
          - os: macos-latest
            rid: osx-x64
            artifact: aeroterm_osx_x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: aeroterm_linux_x64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore NuGet packages
      run: dotnet restore aeroterm.slnx

    - name: Build
      run: dotnet build aeroterm.slnx --configuration Debug --no-restore --nologo

    - name: Run tests
      run: dotnet test Tests/Tests.csproj --configuration Debug --no-build --nologo

    - name: Read version prefix
      id: version
      shell: bash
      run: |
        PREFIX=$(sed -n 's:.*<VersionPrefix>\(.*\)</VersionPrefix>.*:\1:p' Directory.Build.props)
        VERSION="${PREFIX}-ci.${{ github.run_number }}"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    - name: Publish
      run: dotnet publish AeroTerm/AeroTerm.csproj --configuration Release --runtime ${{ matrix.rid }} --self-contained -p:DebugType=none -p:AeroTermVersion=${{ steps.version.outputs.version }}

    - name: Install vpk
      run: dotnet tool install -g vpk

    - name: Package with Velopack
      shell: bash
      run: |
        CHANNEL="${{ matrix.rid }}-ci"
        if [[ "${{ matrix.rid }}" == osx-* ]]; then
          PACK_DIR="AeroTerm/bin/Release/net10.0/${{ matrix.rid }}/AeroTerm.app/Contents/MacOS"
          MAIN_EXE="aeroterm"
          ICON_PATH="AeroTerm/Assets/aeroterm.icns"
        elif [[ "${{ matrix.rid }}" == win-* ]]; then
          PACK_DIR="AeroTerm/bin/Release/net10.0/${{ matrix.rid }}/publish"
          MAIN_EXE="aeroterm.exe"
        else
          PACK_DIR="AeroTerm/bin/Release/net10.0/${{ matrix.rid }}/publish"
          MAIN_EXE="aeroterm"
        fi
        VPK_ARGS=(
          --packId AeroTerm
          --packVersion "${{ steps.version.outputs.version }}"
          --packDir "$PACK_DIR"
          --mainExe "$MAIN_EXE"
          --channel "$CHANNEL"
          --outputDir staging
        )
        if [[ "${{ matrix.rid }}" == osx-* ]]; then
          BUNDLE_ROOT="AeroTerm/bin/Release/net10.0/${{ matrix.rid }}/AeroTerm.app"
          VPK_ARGS+=(--plist "${BUNDLE_ROOT}/Contents/Info.plist")
          VPK_ARGS+=(--icon "$ICON_PATH")
        elif [[ "${{ matrix.rid }}" == win-* ]]; then
          VPK_ARGS+=(--icon "AeroTerm/Assets/aeroterm.ico")
        fi
        vpk pack "${VPK_ARGS[@]}"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: staging/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout gh-pages-src (static web content)
      uses: actions/checkout@v4
      with:
        ref: gh-pages-src
        path: site-src

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Assemble deploy tree
      shell: bash
      run: |
        set -euo pipefail
        DEPLOY_DIR="deploy"
        rm -rf "$DEPLOY_DIR"
        mkdir -p "$DEPLOY_DIR"

        # Copy static web content from gh-pages-src (excluding .git).
        rsync -a --exclude='.git' site-src/ "$DEPLOY_DIR/"

        # Ensure GitHub Pages does not run Jekyll over the binaries.
        touch "$DEPLOY_DIR/.nojekyll"

        # Place the latest CI artifacts under updates/ (no previous binaries carried over).
        UPDATES_DIR="$DEPLOY_DIR/updates"
        mkdir -p "$UPDATES_DIR"
        for RID in win-x64 osx-arm64 osx-x64 linux-x64; do
          ARTIFACT_DIR="artifacts/aeroterm_${RID//-/_}"
          if [ -d "$ARTIFACT_DIR" ]; then
            cp "$ARTIFACT_DIR"/* "$UPDATES_DIR/" 2>/dev/null || true
          fi
        done

        echo "Deploy tree:"
        ls -la "$DEPLOY_DIR/"
        echo "Updates:"
        ls -la "$UPDATES_DIR/"

    - name: Force-push single-commit gh-pages
      shell: bash
      run: |
        set -euo pipefail
        cd deploy
        git init -q -b gh-pages
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -q -m "CI update: $(date -u +%Y%m%d)-${{ github.run_number }}"
        # Force-push so gh-pages always has a single commit containing only the latest build.
        git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
