name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3). Used when dispatching manually; ignored for tag pushes.'
        required: true

permissions:
  contents: write

jobs:
  pack-nuget:
    name: Pack NuGet packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Packing NuGet version: ${VERSION}"

      - name: Restore
        run: dotnet restore aeroterm.slnx

      - name: Pack AeroTerm.Pty
        run: >
          dotnet pack AeroTerm.Pty/AeroTerm.Pty.csproj
          --configuration Release
          --no-restore
          --output artifacts/nupkg
          -p:AeroTermVersion=${{ steps.version.outputs.version }}
          -p:ContinuousIntegrationBuild=true

      - name: Pack AeroTerm.WindowEffects
        run: >
          dotnet pack AeroTerm.WindowEffects/AeroTerm.WindowEffects.csproj
          --configuration Release
          --no-restore
          --output artifacts/nupkg
          -p:AeroTermVersion=${{ steps.version.outputs.version }}
          -p:ContinuousIntegrationBuild=true

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nupkg/*.nupkg

      - name: Push to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        if: ${{ env.NUGET_API_KEY != '' }}
        run: >
          dotnet nuget push artifacts/nupkg/*.nupkg
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  publish-windows-x64:
    name: Publish Windows x64 (portable zip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish
        shell: bash
        run: |
          dotnet publish AeroTerm/AeroTerm.csproj \
            --configuration Release \
            --runtime win-x64 \
            --self-contained true \
            -p:DebugType=none \
            -p:PublishSingleFile=false \
            -p:AeroTermVersion=${{ steps.version.outputs.version }} \
            -o artifacts/app/win-x64

      - name: Zip portable build
        shell: pwsh
        run: |
          $zipName = "AeroTerm-${{ steps.version.outputs.version }}-win-x64.zip"
          Compress-Archive -Path artifacts/app/win-x64/* -DestinationPath "artifacts/$zipName"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aeroterm-win-x64
          path: artifacts/AeroTerm-*-win-x64.zip

  publish-macos:
    name: Publish macOS ${{ matrix.rid }} (.app in .zip)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [osx-x64, osx-arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish AeroTerm/AeroTerm.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:DebugType=none
          -p:AeroTermVersion=${{ steps.version.outputs.version }}

      - name: Zip .app bundle
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE="AeroTerm/bin/Release/net10.0/${{ matrix.rid }}/AeroTerm.app"
          if [ ! -d "$BUNDLE" ]; then
            echo "Expected .app bundle not found at $BUNDLE" >&2
            ls -la "$(dirname "$BUNDLE")" || true
            exit 1
          fi
          mkdir -p artifacts
          ZIP="artifacts/AeroTerm-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip"
          # ditto preserves macOS resource forks / symlinks / permissions.
          ditto -c -k --sequesterRsrc --keepParent "$BUNDLE" "$ZIP"
          ls -la "$ZIP"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aeroterm-${{ matrix.rid }}
          path: artifacts/AeroTerm-*-${{ matrix.rid }}.zip

  publish-linux-x64:
    name: Publish Linux x64 (tar.gz)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish AeroTerm/AeroTerm.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          -p:DebugType=none
          -p:PublishSingleFile=false
          -p:AeroTermVersion=${{ steps.version.outputs.version }}
          -o artifacts/app/linux-x64/AeroTerm

      - name: Create tarball
        shell: bash
        run: |
          set -euo pipefail
          TAR="AeroTerm-${{ steps.version.outputs.version }}-linux-x64.tar.gz"
          tar -C artifacts/app/linux-x64 -czf "artifacts/$TAR" AeroTerm
          ls -la "artifacts/$TAR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aeroterm-linux-x64
          path: artifacts/AeroTerm-*-linux-x64.tar.gz

  release:
    name: Create GitHub Release
    needs: [pack-nuget, publish-windows-x64, publish-macos, publish-linux-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find downloaded-artifacts -type f \
            \( -name '*.nupkg' -o -name '*.snupkg' \
               -o -name '*.zip' -o -name '*.tar.gz' \) \
            -exec cp {} release-assets/ \;
          echo "Release assets:"
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AeroTerm ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          body: |
            AeroTerm ${{ steps.version.outputs.version }}

            See [`docs/release.md`](https://github.com/${{ github.repository }}/blob/master/docs/release.md)
            for the full list of artifacts and the commit log for changes.

            **Deferred / unsigned in MVP:** signed MSIX/MSI, notarized DMG,
            AppImage, author-signed NuGet packages. See `docs/release.md` for
            the path to full signing.
          files: release-assets/*
